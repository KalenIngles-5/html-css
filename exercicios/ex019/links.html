<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>links</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        a{
            color:crimson ;
            text-decoration:none;
            font-weight:bold;
        }

        a:visited{
            color: aqua;
        }

        a:hover{
            color: blueviolet;
            text-decoration: underline ;
        }
        a:active{
            color: deeppink;
        }


        a::before{
            content: "⇒";
            text-decoration: none;
            font-weight: 400;
            color: darkgray
        }

        a::after{
            content:"⇐";
            text-decoration: none;
            font-weight: 400;
            color: darkgray;
        }
            
    </style>
</head>
<body>
     <h1>Personaizando links</h1>

    <ul>
        <li><a href="https://www.youtube.com/@klyt3371" target="_blank">Canal youtube</a></li>

        <li><a href="https//:www.Cursoemvideo.com" target="_blank"> Site do Curso em video</a></li>
    </ul>
</body>
</html>
