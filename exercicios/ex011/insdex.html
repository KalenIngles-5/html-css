<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos HTML5</title>
</head>
<body>
    <h1>Inserindo videos hospedados localmente</h1>
    <h2>Este video esta hospedado no meu servidor</h2>
    <video width="560" poster="imagem/limoes-capa.png" controls autoplay loop>
    <source src="midia/meu.-video.mp4" type="video/mp4"> 

    <p>Seu navegador nao te compatibilidade com reproducao de videos</p>  
    </video>

    <h1>Inserindo videos do youtube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/EFmxPMdBqmU?si=2DM8eZcNyh7P13RC" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    


    </video>
</body>
</html>
