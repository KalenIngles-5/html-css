<!DOCTYPE html>
<html lang="Pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio de Tabela</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.5em;
            
        }
        table{
            width: 700px;
            border-collapse: collapse;
            margin:auto;
        }
        th{
            border: 1px solid black;
            padding: 8px;
            text-align: center;
            vertical-align: middle;
            width: 200px;
        }
        td{
            border: 1px solid black;
            padding: 8px;
            text-align: center;
            vertical-align: middle;
        }
       .cnome{
        background-color: rgb(78, 80, 85);
        color: white;
       }
       
   
    </style>
</head>
<body>
     
  
    <table>
    <colgroup>
         <col class="cnome">
         <col class="csexo">
         <col class="cidade">
         <col class="cprof">
     </colgroup>
        <caption>Cadastro</caption>

        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Idade</th>
            <th scope="col">Sexo</th>
            <th scope="col">Profissão</th>
        </tr>

        <tr>
            <td>João</td>
            <td>20</td>
            <td>Masculino</td>
            <td>Engenheiro</td>
        </tr>
        <tr>
            <td>Marina</td>
            <td>25</td>
            <td>Feminino</td>
            <td>Medica</td>
        </tr>
        <tr>
            <td>Pedro</td>
            <td>30</td>
            <td>Masculino</td>
            <td>Professor</td>
        </tr>
        <tr>
            <td>Ana</td>
            <td>28</td>
            <td>Feminino</td>
            <td>Advogada</td>
        </tr>
        <tr>
            <td>Carlos</td>
            <td>35</td>
            <td>Masculino</td>
            <td>Arquiteto</td>
        </tr>



    </table>
</html>
