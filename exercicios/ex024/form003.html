<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
   <h1>Teste de Formulario </h1> 
   <form action="cadastro.php" method="get" autocomplete="on">
        <p>
    
            <label for="inome">Nome:</label>

            <input type="text" name="nome" id="inome" required minlength="5" maxlength="30" placeholder="Nome completo" autocomplete="name" >

            <input type="submit" value="Enviar">
        
        </p>

        <p>
            <label for="imedia">Media</label>

            <input type="number" name="media" id="imedia" required placeholder="0 a 20" max="20" step="0.1" value="0">

            <input type="submit" value="Enviar" >

        </p> 
        <p>
            <label for="1hora">Hora </label>
            <input type="time" name="" id="1hora">
             <input type="submit" value="Enviar" val required>
        </p>

        <p>
            <label for="idata"> Dia da Prova</label>
            <input type="date" name="date" id="idate" required value="2026-07-15">
            <input type="submit" value="Enviar">

        </p>
        <p>         
            <label for="imes">Pedrido Lectivo</label>
            <input type="month" name="imes" id="imes" required value="2026-07">
            <input type="submit" value="Enviar">


        </p>
        <p>
            <input type="reset" value="limpar">
            
        </p>




   </form>
</body>
</html>
