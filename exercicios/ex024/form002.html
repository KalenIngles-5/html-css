<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>02-form</title>
</head>
<body>
    <h1> Teste de Formulario</h1>
    <form action="cadastro.php" method="post" autocomplete="on">
       <p>

        <label for="iUsu">Usuario:</label>
              
             <input type="text" name="Usu" id="iUsu" required minlength="6" size="18" placeholder="nome do usuario" autocomplete=" username">
             <input type="submit" value="Enviar">
     

       </p> 

       <p>
        <label for="isen"> senha: </label>
           
            <input type="password" name="sen" id="isen" required minlength="7" placeholder="numero da senha" autocomplete="current-password">
            <input type="submit" value="Enviar">
       </p>

       <p><input type="reset" value="limpar"></p>


    </form>
</body>
</html>
