<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html</title>
    <style>
        body{
            background-color: black;

        }

        
        #outra{
            text-align: center;
            color: #fff;
        }
         div#video{
        margin:0px -20px 30px -20px;
        padding: 0px 0px 0px 20px;    
        padding-bottom: 50%;
        position: relative;
        text-align: center;
         }
        div#video > iframe{
        margin: auto;  
        position:absolute;
        left:25%;
        top: 5%;
        width: 50%;
        height: 50%;

          }
    </style>
    
</head>
<body>
    <h1 id="outra">Curso de html5</h1>
    <div id="video"><iframe width="600" height="400" src="https://www.youtube.com/embed/epDCjksKMok?si=sFBWrja_8lUopuso" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></div>
    
</body>
</html>
